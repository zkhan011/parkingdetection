name: Native Tests

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Run Android tests
        run: ./gradlew clean test :android:domain:test :android:app:testDebugUnitTest --stacktrace

      - name: Assemble Android debug APK
        run: ./gradlew :android:app:assembleDebug --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            android/**/build/reports/tests/
            android/**/build/test-results/
          if-no-files-found: warn

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: parking-detection-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios-core-tests:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Swift tests
        working-directory: ios/ParkingDetection
        run: swift test
