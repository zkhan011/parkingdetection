name: Native Tests

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  android-tests-and-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Make Gradle launcher executable
        run: chmod +x ./gradlew

      - name: Run Android tests and assemble debug APK
        run: ./gradlew clean test :android:app:assembleDebug --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            android/domain/build/reports/tests/
            android/data/build/reports/tests/
            android/app/build/reports/tests/
            android/domain/build/test-results/
            android/data/build/test-results/
            android/app/build/test-results/
          if-no-files-found: warn

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: parking-detection-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios-core-tests:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Swift tests
        working-directory: ios/ParkingDetection
        run: swift test
